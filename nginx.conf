server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Behind Google's HTTPS LB terminating TLS on :443. If nginx emits an
  # absolute redirect (e.g. the implicit trailing-slash redirect fired
  # when $uri/ matches a real directory under vite-react-ssg's nested
  # dirStyle), it would otherwise write the listening port into Location,
  # producing http://host:8080/... which the browser can't reach.
  absolute_redirect off;
  port_in_redirect off;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1000;

  # Set Content-Language and no-store per-locale on the HTML routes.
  # nested dirStyle means the English variants live under /en/... so a
  # single prefix rule covers all of them (/en, /en/terms, /en/privacy).
  # Everything else is Hebrew. The no-store is load-bearing: the language
  # switcher needs fresh HTML, and with Cloud CDN in front we also don't
  # want edges caching the client-side /→/en/ redirect scaffolding.
  # Hashed assets and images get their own location blocks below — regex
  # locations take precedence over these prefix blocks, so they're not
  # affected by the no-store applied here.
  location ^~ /en/ {
    add_header Content-Language "en" always;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    try_files $uri $uri/ /index.html;
  }

  location = /en {
    return 301 /en/;
  }

  location / {
    add_header Content-Language "he" always;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Unhashed static files copied from /public/ (hero, favicon). Vite
  # doesn't fingerprint these, so cache them for 30d — long enough to
  # win at the edge, short enough to recover if a rename is forgotten
  # when a file is replaced.
  location ~* \.(jpg|jpeg|png|gif|svg|ico|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public" always;
  }
}
