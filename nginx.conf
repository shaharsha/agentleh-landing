server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Behind Google's HTTPS LB terminating TLS on :443. If nginx emits an
  # absolute redirect (e.g. the implicit trailing-slash redirect fired
  # when $uri/ matches a real directory under vite-react-ssg's nested
  # dirStyle), it would otherwise write the listening port into Location,
  # producing http://host:8080/... which the browser can't reach.
  absolute_redirect off;
  port_in_redirect off;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1000;

  # Set Content-Language per-locale. nested dirStyle means the English
  # variants live under /en/... so a single prefix rule covers all of
  # them (/en, /en/terms, /en/privacy). Everything else is Hebrew.
  location ^~ /en/ {
    add_header Content-Language "en" always;
    try_files $uri $uri/ /index.html;
  }

  location = /en {
    return 301 /en/;
  }

  location / {
    add_header Content-Language "he" always;
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Unhashed static files copied from /public/ (hero, favicon). Vite
  # doesn't fingerprint these, so cache them for 30d — long enough to
  # win at the edge, short enough to recover if a rename is forgotten
  # when a file is replaced.
  location ~* \.(jpg|jpeg|png|gif|svg|ico|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public" always;
  }

  # Never cache top-level HTML — locale redirects + switcher need fresh
  # responses so a visitor who changes language doesn't see a stale cache.
  location ~ ^/(index\.html|en/index\.html|terms/index\.html|privacy/index\.html|en/terms/index\.html|en/privacy/index\.html)$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }
}
