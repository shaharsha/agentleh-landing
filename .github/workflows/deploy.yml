name: Deploy

on:
  push:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "service=agentleh-landing" >> "$GITHUB_OUTPUT"
            echo "health_url=https://agentiko.io/" >> "$GITHUB_OUTPUT"
            echo "app_url=https://app.agentiko.io" >> "$GITHUB_OUTPUT"
          else
            echo "service=agentleh-landing-dev" >> "$GITHUB_OUTPUT"
            echo "health_url=https://dev.agentiko.io/" >> "$GITHUB_OUTPUT"
            echo "app_url=https://app-dev.agentiko.io" >> "$GITHUB_OUTPUT"
          fi

      - name: Auth to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build image via Cloud Build
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --region=europe-west3 \
            --substitutions=_SERVICE=${{ steps.env.outputs.service }},_TAG=${{ github.sha }},_VITE_APP_URL=${{ steps.env.outputs.app_url }} \
            --suppress-logs \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ steps.env.outputs.service }} \
            --image=europe-west3-docker.pkg.dev/agentleh/images/${{ steps.env.outputs.service }}:${{ github.sha }} \
            --region=europe-west3 \
            --quiet

      - name: Verify
        run: |
          for i in $(seq 1 10); do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" "${{ steps.env.outputs.health_url }}" || echo 000)
            if [ "$CODE" = "200" ]; then
              echo "Landing healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed"; exit 1
