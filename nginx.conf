server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1000;

  # Set Content-Language per-locale. nested dirStyle means the English
  # variants live under /en/... so a single prefix rule covers all of
  # them (/en, /en/terms, /en/privacy). Everything else is Hebrew.
  location ^~ /en/ {
    add_header Content-Language "en" always;
    try_files $uri $uri/ /index.html;
  }

  location = /en {
    return 301 /en/;
  }

  location / {
    add_header Content-Language "he" always;
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Never cache top-level HTML — locale redirects + switcher need fresh
  # responses so a visitor who changes language doesn't see a stale cache.
  location ~ ^/(index\.html|en/index\.html|terms/index\.html|privacy/index\.html|en/terms/index\.html|en/privacy/index\.html)$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }
}
