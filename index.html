<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" id="favicon" type="image/svg+xml" href="/favicon-light.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <script>
      // Favicon tracks the OS color scheme only - never the in-app theme
      // toggle. Chrome/Edge ignore @media inside SVG favicons and the
      // `media` attribute on <link rel="icon">, so we swap the href in JS
      // at first paint and whenever the OS flips dark/light.
      (function () {
        try {
          var mq = window.matchMedia('(prefers-color-scheme: dark)');
          var link = document.getElementById('favicon');
          function apply(dark) {
            link.href = dark ? '/favicon-dark.svg' : '/favicon-light.svg';
          }
          apply(mq.matches);
          if (mq.addEventListener) {
            mq.addEventListener('change', function (e) { apply(e.matches); });
          } else if (mq.addListener) {
            mq.addListener(function (e) { apply(e.matches); });
          }
        } catch (e) {
          // matchMedia unavailable - the static light link above is the fallback.
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#F3EAD3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0E1320" media="(prefers-color-scheme: dark)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script>
      // Resolve the active theme BEFORE React hydrates. Prevents a flash
      // of light content for dark-pinned visitors (and vice-versa) on
      // the SSG-rendered HTML. Must match src/theme/store.ts::readStoredTheme:
      //   1. cookie `agentleh.theme` — shared with app.agentiko.io via
      //      Domain=.agentiko.io
      //   2. localStorage['agentleh.theme'] — per-origin fallback for
      //      users who set a pick before the cookie rollout
      //   3. prefers-color-scheme media query (the 'auto' path)
      (function () {
        try {
          function readCookie(name) {
            var prefix = name + '=';
            var parts = document.cookie.split(';');
            for (var i = 0; i < parts.length; i++) {
              var p = parts[i].replace(/^\s+/, '');
              if (p.indexOf(prefix) === 0) {
                try { return decodeURIComponent(p.slice(prefix.length)); }
                catch (e) { return p.slice(prefix.length); }
              }
            }
            return null;
          }
          var cookie = readCookie('agentleh.theme');
          var saved = localStorage.getItem('agentleh.theme');
          var mode;
          if (cookie === 'light' || cookie === 'dark') {
            mode = cookie;
          } else if (saved === 'light' || saved === 'dark') {
            mode = saved;
          } else {
            mode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          document.documentElement.setAttribute('data-theme', mode);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <script>
      // On first visit to the root, hand off to /en if the visitor's
      // expressed or detected language is English. The landing's
      // rendered locale is URL-driven (Paraglide), so only the root has
      // ambiguity — non-root paths (/en/terms, /privacy) keep respecting
      // the URL, which keeps shared links working.
      //
      // Resolution (matches the app's pickInitialLang order):
      //   1. cookie `agentleh.lang` — shared with app.agentiko.io via
      //      Domain=.agentiko.io. An English pick on the app lands
      //      users on /en here.
      //   2. legacy PARAGLIDE_LOCALE in localStorage (pre-cookie users)
      //   3. Walk navigator.languages, first supported primary tag wins
      //   4. Default: Hebrew (no redirect)
      //
      // sessionStorage marker stops an `English` auto-redirect from
      // fighting a same-tab click on עב — without it the switcher would
      // navigate to /, then the script would bounce back to /en.
      (function () {
        try {
          if (sessionStorage.getItem('agentleh.landing.detected')) return;
          if (location.pathname !== '/') return;
          function readCookie(name) {
            var prefix = name + '=';
            var parts = document.cookie.split(';');
            for (var i = 0; i < parts.length; i++) {
              var p = parts[i].replace(/^\s+/, '');
              if (p.indexOf(prefix) === 0) {
                try { return decodeURIComponent(p.slice(prefix.length)); }
                catch (e) { return p.slice(prefix.length); }
              }
            }
            return null;
          }
          var pick = readCookie('agentleh.lang');
          if (pick !== 'he' && pick !== 'en') {
            pick = localStorage.getItem('PARAGLIDE_LOCALE');
          }
          if (pick === 'en') {
            sessionStorage.setItem('agentleh.landing.detected', '1');
            location.replace('/en' + location.search + location.hash);
            return;
          }
          if (pick === 'he') return;
          var langs = navigator.languages && navigator.languages.length
            ? navigator.languages
            : [navigator.language || 'he'];
          for (var i = 0; i < langs.length; i++) {
            var primary = String(langs[i]).toLowerCase().split('-')[0];
            if (primary === 'he' || primary === 'iw') return;
            if (primary === 'en') {
              sessionStorage.setItem('agentleh.landing.detected', '1');
              location.replace('/en' + location.search + location.hash);
              return;
            }
          }
        } catch (e) {
          // localStorage/sessionStorage/navigator disabled — keep defaults
        }
      })();
    </script>
    <title>agentiko</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
